<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youssef & Maryam | Engagement</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --blush: #fff5f5;
            --text: #4a4a4a;
            --white: #ffffff;
        }

        body {
            background-color: var(--blush);
            color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
        }

        .container {
            padding: 60px 20px;
            max-width: 500px;
            width: 90%;
            border: 1px solid var(--gold);
            margin: 50px 10px;
            background: var(--white);
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            position: relative;
            border-radius: 5px;
        }

        /* Floral Decoration (Pseudo-elements) */
        .container::before {
            content: "✿"; font-size: 2rem; color: var(--gold); position: absolute; top: 10px; left: 10px; opacity: 0.5;
        }
        .container::after {
            content: "✿"; font-size: 2rem; color: var(--gold); position: absolute; bottom: 10px; right: 10px; opacity: 0.5;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.8rem;
            color: var(--gold);
            margin: 0;
            font-weight: 400;
        }

        h2 { font-weight: 300; letter-spacing: 4px; text-transform: uppercase; font-size: 1rem; margin-bottom: 20px; color: #888; }

        #countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 40px 0;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            min-width: 60px;
        }

        .time-val { font-size: 2.2rem; color: var(--gold); font-weight: 600; }
        .time-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #999; }

        .details {
            margin: 40px 0;
            line-height: 2;
            font-size: 1.2rem;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 20px 0;
        }

        a { color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold); }
        .venue { font-weight: 600; }

        .rsvp-section {
            background: #fafafa;
            padding: 30px 20px;
            margin-top: 30px;
            border-radius: 8px;
        }

        input[type="text"] {
            padding: 12px;
            border: 1px solid #ddd;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-family: inherit;
            border-radius: 4px;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        button {
            padding: 14px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            width: 100%;
        }

        .btn-yes { background: var(--gold); color: white; }
        .btn-no { background: #e0e0e0; color: #666; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        #responseMsg { font-style: italic; color: var(--gold); margin-top: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Save The Date</h2>
        <h1>Youssef & Maryam</h1>
        <p style="letter-spacing: 2px; color: #777;">ARE GETTING ENGAGED</p>

        <div id="countdown">
            <div class="time-box"><span class="time-val" id="days">00</span><span class="time-label">Days</span></div>
            <div class="time-box"><span class="time-val" id="hours">00</span><span class="time-label">Hrs</span></div>
            <div class="time-box"><span class="time-val" id="mins">00</span><span class="time-label">Mins</span></div>
            <div class="time-box"><span class="time-val" id="secs">00</span><span class="time-label">Secs</span></div>
        </div>

        <div class="details">
            <span style="font-weight: 600;">Saturday, March 28, 2026</span><br>
            At 7:00 PM<br>
            Venue: <a class="venue" href="https://maps.app.goo.gl/aYjqKGjWmboGDMwY6" target="_blank">Aperitivo</a><br>
            <span style="font-size: 0.9rem; color: #999;">Minimum Charge: 1200 LE</span>
        </div>

        <div class="rsvp-section">
            <h3 style="font-weight: 300; margin-top: 0;">Kindly RSVP</h3>
            <div id="formWrapper">
                <input type="text" id="guestName" placeholder="Full Name" required>
                <input type="text" id="songRequest" placeholder="Song Request (Optional)">
                <div class="btn-group">
                    <button type="button" class="btn-yes" id="btnYes" onclick="submitRSVP('Yes')">Joyfully Accept</button>
                    <button type="button" class="btn-no" id="btnNo" onclick="submitRSVP('No')">Regretfully Decline</button>
                </div>
            </div>
            <p id="responseMsg" style="display:none;">Thank you! We've saved your response.</p>
        </div>
    </div>

    <script>
        // --- COUNTDOWN LOGIC ---
        const targetDate = new Date("March 28, 2026 19:00:00").getTime();

        const timer = setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;

            document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("mins").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("secs").innerText = Math.floor((distance % (1000 * 60)) / 1000);

            if (distance < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "TODAY IS THE DAY!";
            }
        }, 1000);

        // --- RSVP SUBMISSION ---
        function submitRSVP(status) {
            const name = document.getElementById('guestName').value;
            const song = document.getElementById('songRequest').value;
            const scriptURL = 'https://script.google.com/a/macros/aucegypt.edu/s/AKfycbx9CnFGSX5vugFPF7gaRhfvL7VigjuWwpvat2JMWTcwDlDBt-aj3rYKdxF2Y42j6eO9DQ/exec';

            if (!name) { 
                alert("Please enter your name so we know who you are!"); 
                return; 
            }

            // Change button state to show it's working
            const btnYes = document.getElementById('btnYes');
            const btnNo = document.getElementById('btnNo');
            btnYes.innerText = "Sending...";
            btnYes.disabled = true;
            btnNo.disabled = true;

            // Send to Google Sheets
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors', // Standard for Google Script Web Apps
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ "name": name, "status": status, "song": song })
            })
            .then(() => {
                document.getElementById('formWrapper').style.display = 'none';
                document.getElementById('responseMsg').style.display = 'block';
            })
            .catch(error => {
                alert("Something went wrong. Please try again!");
                btnYes.innerText = "Joyfully Accept";
                btnYes.disabled = false;
                btnNo.disabled = false;
            });
        }
    </script>
</body>
</html>
