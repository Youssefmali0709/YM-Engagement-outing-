<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youssef & Maryam | Engagement</title>

    <style>
        :root {
            --gold: #c5a059;
            --blush: #fffafc;
            --dark-grey: #555555; 
            --medium-grey: #777777;
            --text: #333333;
            --white: #ffffff;
        }

        body {
            background-color: var(--blush);
            color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
            text-align: center;
        }

        .container {
            padding: 60px 25px;
            max-width: 480px;
            width: 88%;
            border: 1.5px solid var(--gold);
            background: var(--white);
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            position: relative;
            border-radius: 4px;
            margin: 20px auto;
        }

        /* NEW CURSIVE FONT: Dancing Script */
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: var(--gold);
            margin: 0; 
            padding: 0;
            font-weight: 600;
            white-space: nowrap;
            text-transform: none !important;
            line-height: 1.1;
        }

        .invite-text {
            letter-spacing: 2px; 
            color: var(--dark-grey); 
            font-size: 1rem; 
            margin: 15px 0 25px 0; 
            text-transform: uppercase;
            line-height: 1.4;
        }

        .the-date {
            font-size: 1.8rem;
            font-weight: 600;
            display: block;
            margin: 10px 0 5px 0;
            color: var(--text);
            letter-spacing: 1px;
        }

        #countdown {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 5px 0 35px 0;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            min-width: 45px;
        }

        .time-val { font-size: 1.1rem; color: var(--gold); font-weight: 600; }
        .time-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 1px; color: var(--medium-grey); font-weight: 600; }

        .details {
            margin: 30px 0;
            line-height: 1.6;
            font-size: 1.1rem;
            border-top: 1px solid #eeeeee;
            border-bottom: 1px solid #eeeeee;
            padding: 25px 0;
            color: var(--text);
        }

        /* Updated Venue Styling */
        .venue-full-line {
            display: block;
            margin-bottom: 8px;
            font-size: 1.05rem;
        }

        .venue-link { 
            color: var(--gold); 
            text-decoration: none; 
            font-weight: 600;
            font-size: 1.2rem;
            margin-left: 2px;
        }

        .address {
            display: block;
            font-size: 0.9rem;
            color: var(--medium-grey);
            margin-top: 5px;
        }

        .min-charge-box {
            margin-top: 15px;
        }

        .min-charge {
            font-size: 0.85rem; 
            color: var(--medium-grey); 
            display: block;
            font-weight: 600;
        }

        /* UPDATED: Removed Italic */
        .special-note {
            font-size: 1rem;
            color: var(--dark-grey);
            display: block;
            margin-top: 8px;
            font-style: normal; /* Forces non-italic */
        }
