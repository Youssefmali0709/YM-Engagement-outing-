<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youssef & Maryam | Engagement</title>

        :root {
            --gold: #c5a059;
            --blush: #fff5f5;
            --text: #4a4a4a;
            --white: #ffffff;
        }

        body {
            background-color: var(--blush);
            color: var(--text);
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png');
            text-align: center;
        }

        .container {
            padding: 40px 20px;
            max-width: 500px;
            width: 85%;
            border: 1px solid var(--gold);
            background: var(--white);
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            position: relative;
            border-radius: 5px;
            margin: 20px auto;
        }

        /* Using Playfair Display to ensure Y and M are Capitalized */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; 
            font-style: italic;
            color: var(--gold);
            margin: 15px 0;
            font-weight: 600;
            white-space: nowrap;
            text-transform: none !important; /* Strict override */
            letter-spacing: 1px;
        }

        h2 { 
            font-weight: 300; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            margin-bottom: 5px; 
            color: #888; 
        }

        .the-date {
            font-size: 1.9rem;
            font-weight: 600;
            display: block;
            margin: 15px 0 5px 0;
            color: var(--text);
        }

        #countdown {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 5px 0 25px 0;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            min-width: 40px;
        }

        .time-val { font-size: 1rem; color: var(--gold); font-weight: 600; }
        .time-label { font-size: 0.5rem; text-transform: uppercase; letter-spacing: 1px; color: #999; }

        .details {
            margin: 25px 0;
            line-height: 1.6;
            font-size: 1.1rem;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 20px 0;
        }

        a { color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold); font-weight: 600; }

        .rsvp-section {
            background: #fafafa;
            padding: 25px 15px;
            margin-top: 20px;
            border-radius: 8px;
        }
